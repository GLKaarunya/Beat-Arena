<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Beat Arena 🎧 | Play Beats</title>

  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css?family=Arvo" rel="stylesheet">

  <link rel="icon" href="images/snare.png">
</head>

<body>

  <h1 id="title">Beat Arena 🥁</h1>

  <div class="set">
    <button class="w drum">w</button>
    <button class="a drum">a</button>
    <button class="s drum">s</button>
    <button class="d drum">d</button>
    <button class="j drum">j</button>
    <button class="k drum">k</button>
    <button class="l drum">l</button>
  </div>

  <div class="volume-container">
    <label>🔊 Volume</label><br>
    <input type="range" min="0" max="1" step="0.1" value="1" id="volume">
  </div>

  <footer class="footer">
    <p class="footer-text">🎵 Play Using Your Keyboard:</p>

    <div class="key-hints">
      <span>w</span>
      <span>a</span>
      <span>s</span>
      <span>d</span>
      <span>j</span>
      <span>k</span>
      <span>l</span>
    </div>

    <p class="footer-sub">or click the buttons above 👆</p>
  </footer>

  <script src="index.js"></script>
</body>
</html>
